<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU Price Tracker — Canada</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --green: #4ade80;
      --red: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
    header p { color: var(--text-muted); font-size: 0.875rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 0.25rem; }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section h2 { font-size: 1.125rem; margin-bottom: 1rem; }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .filter-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.375rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.8125rem;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .chart-container { position: relative; height: 400px; }

    .gpu-table { width: 100%; border-collapse: collapse; }

    .gpu-table th, .gpu-table td {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .gpu-table th {
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .gpu-table td { font-size: 0.875rem; }
    .gpu-table tr:hover { background: rgba(56, 189, 248, 0.05); }

    .price { font-weight: 600; font-variant-numeric: tabular-nums; }
    .price.good { color: var(--green); }

    .location { color: var(--text-muted); font-size: 0.8125rem; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .listings-table { overflow-x: auto; }

    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .page-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.8125rem;
      transition: all 0.15s;
    }

    .page-btn:hover { border-color: var(--accent); color: var(--text); }
    .page-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    .page-info { color: var(--text-muted); font-size: 0.8125rem; }

    .listing-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .listing-controls select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.375rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.8125rem;
    }

    .listing-controls label {
      color: var(--text-muted);
      font-size: 0.8125rem;
    }

    .post-link {
      display: block;
      max-width: 350px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 640px) {
      .chart-container { height: 300px; }
      .gpu-table .hide-mobile { display: none; }
      .post-link { max-width: 180px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎮 GPU Price Tracker</h1>
      <p>Tracking used GPU prices from r/CanadianHardwareSwap</p>
      <p id="updated" style="margin-top: 0.25rem;"></p>
    </header>

    <div class="stats-grid" id="stats"></div>

    <div class="section">
      <h2>Price Trends</h2>
      <div class="filter-bar" id="gpu-filters"></div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <div class="section">
      <h2>Summary by Model</h2>
      <div class="listings-table">
        <table class="gpu-table" id="summary-table">
          <thead>
            <tr>
              <th>GPU</th>
              <th>Listings</th>
              <th>Avg Price</th>
              <th>Min</th>
              <th>Max</th>
              <th>Latest</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <h2>All Listings</h2>
      <div class="listing-controls">
        <label>Filter:
          <select id="listing-gpu-filter">
            <option value="all">All GPUs</option>
          </select>
        </label>
        <label>Sort:
          <select id="listing-sort">
            <option value="date-desc">Newest first</option>
            <option value="date-asc">Oldest first</option>
            <option value="price-asc">Price: low → high</option>
            <option value="price-desc">Price: high → low</option>
          </select>
        </label>
        <span class="page-info" id="listing-count"></span>
      </div>
      <div class="listings-table">
        <table class="gpu-table" id="listings-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>GPU</th>
              <th>Price</th>
              <th class="hide-mobile">Location</th>
              <th>Post</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script>
    const COLORS = [
      '#38bdf8', '#4ade80', '#f87171', '#facc15', '#a78bfa',
      '#fb923c', '#2dd4bf', '#f472b6', '#818cf8', '#34d399',
      '#fbbf24', '#e879f9', '#22d3ee', '#a3e635', '#fb7185',
    ];

    const PAGE_SIZE = 25;
    let chart = null;
    let allData = null;
    let activeGPUs = new Set();
    let listingPage = 1;

    async function loadData() {
      try {
        const resp = await fetch('data.json');
        allData = await resp.json();
        render();
      } catch (e) {
        document.getElementById('stats').innerHTML =
          '<div class="empty-state">No data yet — waiting for first cron run.</div>';
      }
    }

    function getFilteredListings() {
      const gpuFilter = document.getElementById('listing-gpu-filter').value;
      const sort = document.getElementById('listing-sort').value;

      let listings = [...allData.listings];
      if (gpuFilter !== 'all') {
        listings = listings.filter(l => l.gpu === gpuFilter);
      }

      listings.sort((a, b) => {
        switch (sort) {
          case 'date-desc': return (b.date || '').localeCompare(a.date || '');
          case 'date-asc': return (a.date || '').localeCompare(b.date || '');
          case 'price-asc': return a.price - b.price;
          case 'price-desc': return b.price - a.price;
        }
        return 0;
      });

      return listings;
    }

    function renderListings() {
      const listings = getFilteredListings();
      const totalPages = Math.max(1, Math.ceil(listings.length / PAGE_SIZE));
      if (listingPage > totalPages) listingPage = totalPages;

      const start = (listingPage - 1) * PAGE_SIZE;
      const pageListings = listings.slice(start, start + PAGE_SIZE);

      document.getElementById('listing-count').textContent =
        `${listings.length} listing${listings.length !== 1 ? 's' : ''}`;

      const tbody = document.querySelector('#listings-table tbody');
      tbody.innerHTML = pageListings.map(l => {
        const avgForModel = allData.summary[l.gpu]?.avg;
        const priceClass = avgForModel && l.price < avgForModel * 0.9 ? ' good' : '';
        return `<tr>
          <td>${l.date || '—'}</td>
          <td><strong>${l.gpu || '—'}</strong></td>
          <td class="price${priceClass}">$${l.price.toLocaleString()}</td>
          <td class="hide-mobile location">${l.location || '—'}</td>
          <td><a class="post-link" href="${l.url}" target="_blank" rel="noopener" title="${escHtml(l.title)}">${escHtml(l.title)}</a></td>
        </tr>`;
      }).join('');

      // Pagination
      const pag = document.getElementById('pagination');
      if (totalPages <= 1) { pag.innerHTML = ''; return; }

      let html = `<button class="page-btn" onclick="goPage(${listingPage - 1})" ${listingPage <= 1 ? 'disabled' : ''}>&laquo;</button>`;

      const range = pagRange(listingPage, totalPages);
      for (const p of range) {
        if (p === '...') {
          html += `<span class="page-info">…</span>`;
        } else {
          html += `<button class="page-btn${p === listingPage ? ' active' : ''}" onclick="goPage(${p})">${p}</button>`;
        }
      }

      html += `<button class="page-btn" onclick="goPage(${listingPage + 1})" ${listingPage >= totalPages ? 'disabled' : ''}>&raquo;</button>`;
      html += `<span class="page-info">${start + 1}–${Math.min(start + PAGE_SIZE, listings.length)} of ${listings.length}</span>`;
      pag.innerHTML = html;
    }

    function pagRange(current, total) {
      if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
      const pages = [1];
      if (current > 3) pages.push('...');
      for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) pages.push(i);
      if (current < total - 2) pages.push('...');
      pages.push(total);
      return pages;
    }

    function goPage(p) {
      const total = Math.ceil(getFilteredListings().length / PAGE_SIZE);
      if (p < 1 || p > total) return;
      listingPage = p;
      renderListings();
      document.getElementById('listings-table').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function render() {
      if (!allData) return;

      const updated = new Date(allData.updated);
      document.getElementById('updated').textContent =
        `Last updated: ${updated.toLocaleDateString('en-CA')} ${updated.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' })}`;

      // Stats
      const gpuCount = Object.keys(allData.summary).length;
      const allPrices = allData.listings.map(l => l.price);
      const avgPrice = allPrices.length ? Math.round(allPrices.reduce((a, b) => a + b, 0) / allPrices.length) : 0;
      const dates = allData.listings.map(l => l.date).filter(Boolean).sort();
      const dateRange = dates.length ? `${dates[0]} — ${dates[dates.length - 1]}` : '—';

      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="label">Total Listings</div>
          <div class="value">${allData.total_listings}</div>
        </div>
        <div class="stat-card">
          <div class="label">GPU Models</div>
          <div class="value">${gpuCount}</div>
        </div>
        <div class="stat-card">
          <div class="label">Avg Price</div>
          <div class="value">$${avgPrice.toLocaleString()}</div>
        </div>
        <div class="stat-card">
          <div class="label">Date Range</div>
          <div class="value" style="font-size: 1rem">${dateRange}</div>
        </div>
      `;

      // GPU filter buttons (chart)
      const gpus = Object.keys(allData.summary).sort();
      if (activeGPUs.size === 0) {
        gpus.sort((a, b) => allData.summary[b].count - allData.summary[a].count);
        gpus.slice(0, 5).forEach(g => activeGPUs.add(g));
        gpus.sort();
      }

      const filterBar = document.getElementById('gpu-filters');
      filterBar.innerHTML = gpus.map(gpu => {
        const active = activeGPUs.has(gpu) ? ' active' : '';
        return `<button class="filter-btn${active}" data-gpu="${gpu}">${gpu} (${allData.summary[gpu].count})</button>`;
      }).join('');

      filterBar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const gpu = btn.dataset.gpu;
          if (activeGPUs.has(gpu)) activeGPUs.delete(gpu);
          else activeGPUs.add(gpu);
          render();
        });
      });

      renderChart();

      // Summary table
      const summaryGPUs = [...gpus].sort((a, b) => allData.summary[b].count - allData.summary[a].count);
      const summaryBody = document.querySelector('#summary-table tbody');
      summaryBody.innerHTML = summaryGPUs.map(gpu => {
        const s = allData.summary[gpu];
        return `<tr>
          <td><strong>${gpu}</strong></td>
          <td>${s.count}</td>
          <td class="price">$${s.avg.toLocaleString()}</td>
          <td class="price good">$${s.min.toLocaleString()}</td>
          <td class="price" style="color: var(--red)">$${s.max.toLocaleString()}</td>
          <td class="price">$${s.latest.toLocaleString()}</td>
        </tr>`;
      }).join('');

      // Listing GPU filter dropdown
      const gpuSelect = document.getElementById('listing-gpu-filter');
      const currentVal = gpuSelect.value;
      gpuSelect.innerHTML = '<option value="all">All GPUs</option>' +
        summaryGPUs.map(g => `<option value="${g}" ${g === currentVal ? 'selected' : ''}>${g} (${allData.summary[g].count})</option>`).join('');

      renderListings();
    }

    function renderChart() {
      const ctx = document.getElementById('priceChart').getContext('2d');
      const datasets = [];
      let colorIdx = 0;

      activeGPUs.forEach(gpu => {
        const points = allData.listings
          .filter(l => l.gpu === gpu)
          .map(l => ({ x: l.date, y: l.price }));

        if (points.length > 0) {
          const color = COLORS[colorIdx % COLORS.length];
          datasets.push({
            label: gpu,
            data: points,
            borderColor: color,
            backgroundColor: color + '33',
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.1,
            borderWidth: 2,
          });
          colorIdx++;
        }
      });

      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'nearest', intersect: false },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'day', tooltipFormat: 'MMM d, yyyy' },
              grid: { color: 'rgba(51, 65, 85, 0.5)' },
              ticks: { color: '#94a3b8' },
            },
            y: {
              beginAtZero: false,
              grid: { color: 'rgba(51, 65, 85, 0.5)' },
              ticks: { color: '#94a3b8', callback: v => '$' + v.toLocaleString() },
            },
          },
          plugins: {
            legend: { labels: { color: '#e2e8f0' } },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString()}`,
              },
            },
          },
        },
      });
    }

    // Event listeners for listing controls
    document.getElementById('listing-gpu-filter').addEventListener('change', () => { listingPage = 1; renderListings(); });
    document.getElementById('listing-sort').addEventListener('change', () => { listingPage = 1; renderListings(); });

    loadData();
  </script>
</body>
</html>
